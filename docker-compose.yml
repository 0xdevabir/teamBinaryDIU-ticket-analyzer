# =============================================================================
# Ticket Analyzer — Cross-platform Docker Compose
# Works on: macOS (Intel + Apple Silicon), Linux, Windows (Docker Desktop / WSL2)
#
# Quick start:
#   cp .env.example .env
#   docker compose up --build
#
# Windows tip: if port 80 is blocked, set FRONTEND_PORT=8080 in .env
# =============================================================================

name: ticket-analyzer

services:
  postgres:
    image: postgres:16-alpine
    container_name: ticket-analyzer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ticket_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticket_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ticket_analyzer}
      PGDATA: /var/lib/postgresql/data/pgdata
      # Avoid locale issues across host OS
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - ticket-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: ticket-analyzer-backend:latest
    container_name: ticket-analyzer-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ticket_user}:${POSTGRES_PASSWORD:-ticket_secret}@postgres:5432/${POSTGRES_DB:-ticket_analyzer}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80,http://127.0.0.1,http://127.0.0.1:80}
      DEBUG: ${DEBUG:-false}
      AI_INFERENCE_MODE: ${AI_INFERENCE_MODE:-auto}
      HF_API_TOKEN: ${HF_API_TOKEN:-}
      HF_ZERO_SHOT_MODEL: ${HF_ZERO_SHOT_MODEL:-typeform/distilbert-base-uncased-mnli}
      HF_SUMMARIZATION_MODEL: ${HF_SUMMARIZATION_MODEL:-sshleifer/distilbart-cnn-12-6}
      AI_REQUEST_TIMEOUT: ${AI_REQUEST_TIMEOUT:-60}
      SEED_ENABLED: ${SEED_ENABLED:-true}
      PRELOAD_MODELS_ON_STARTUP: ${PRELOAD_MODELS_ON_STARTUP:-false}
      DB_WAIT_ATTEMPTS: ${DB_WAIT_ATTEMPTS:-30}
      DB_WAIT_DELAY: ${DB_WAIT_DELAY:-2}
    volumes:
      - huggingface_cache:/app/.cache/huggingface
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks:
      - ticket-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    image: ticket-analyzer-frontend:latest
    container_name: ticket-analyzer-ui
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - ticket-net

volumes:
  postgres_data:
    driver: local
  huggingface_cache:
    driver: local

networks:
  ticket-net:
    driver: bridge
