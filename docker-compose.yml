services:
  postgres:
    image: postgres:16-alpine
    container_name: ticket-analyzer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ticket_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticket_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ticket_analyzer}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticket_user} -d ${POSTGRES_DB:-ticket_analyzer}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ticket-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: ticket-analyzer-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ticket_user}:${POSTGRES_PASSWORD:-ticket_secret}@postgres:5432/${POSTGRES_DB:-ticket_analyzer}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ticket-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: ticket-analyzer-ui
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - ticket-net

volumes:
  postgres_data:

networks:
  ticket-net:
    driver: bridge
