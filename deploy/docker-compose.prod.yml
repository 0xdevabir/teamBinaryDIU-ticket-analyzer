# =============================================================================
# VM production overrides — bind services to localhost only
# Usage: docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml up -d --build
# =============================================================================

services:
  postgres:
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  backend:
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"

  frontend:
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8080}:80"
