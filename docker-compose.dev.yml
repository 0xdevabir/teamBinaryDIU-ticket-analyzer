# =============================================================================
# Development overrides — hot reload (Mac / Linux / Windows Docker Desktop)
# Run:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# =============================================================================

services:
  backend:
    build:
      target: development
    volumes:
      # Relative paths work on Mac, Linux, and Windows (Docker Desktop / WSL2)
      - ./backend:/app
      - huggingface_cache:/app/.cache/huggingface
    environment:
      DEBUG: "true"
      PRELOAD_MODELS_ON_STARTUP: "false"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      disable: true

  frontend:
    build:
      target: development
    volumes:
      - ./frontend:/app
      # Anonymous volume — prevents host node_modules from breaking Linux container
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend
    healthcheck:
      disable: true

volumes:
  frontend_node_modules:
    driver: local
