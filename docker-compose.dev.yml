# =============================================================================
# Development overrides — hot reload
# Run:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# =============================================================================

services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  backend:
    build:
      target: development
    volumes:
      - ./backend:/app
    environment:
      DEBUG: "true"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 2G

  frontend:
    build:
      target: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 512M
